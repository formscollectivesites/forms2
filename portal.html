<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بوابة الاستمارات</title>
  <style>
    @font-face { font-family: 'Thmanyah'; src: url('fonts/thmanyahsans-Regular.otf') format('opentype'); font-weight: 400; }
    @font-face { font-family: 'Thmanyah'; src: url('fonts/thmanyahsans-Medium.otf')  format('opentype'); font-weight: 500; }
    @font-face { font-family: 'Thmanyah'; src: url('fonts/thmanyahsans-Bold.otf')    format('opentype'); font-weight: 700; }
    @font-face { font-family: 'Thmanyah'; src: url('fonts/thmanyahsans-Light.otf')   format('opentype'); font-weight: 300; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light;
      --brand:       #534AB7;
      --brand-light: #EEEDFE;
      --brand-dark:  #3C3489;
      --bg:          #F5F4F2;
      --surface:     #FFFFFF;
      --surface-2:   #F9F9F8;
      --border:      rgba(0,0,0,0.08);
      --border-s:    rgba(0,0,0,0.14);
      --text-1:      #1A1A1A;
      --text-2:      #555550;
      --text-3:      #999994;
      --danger:      #D03B3B;
      --danger-bg:   #FDEAEA;
      --radius-card: 16px;
      --radius-btn:  10px;
      --c1-bg:#EEEDFE; --c1-fg:#534AB7;
      --c2-bg:#E6F1FB; --c2-fg:#185FA5;
      --c3-bg:#EAF3DE; --c3-fg:#3B6D11;
      --c4-bg:#E1F5EE; --c4-fg:#0F6E56;
      --c5-bg:#FAECE7; --c5-fg:#993C1D;
      --c6-bg:#FBEAF0; --c6-fg:#993556;
      --ca-bg:#FFF8E6; --ca-fg:#B45309;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      font-family: 'Thmanyah', 'Tajawal', 'Segoe UI', Arial, sans-serif;
      color: var(--text-1);
      direction: rtl;
      -webkit-font-smoothing: antialiased;
    }

    .page { max-width: 720px; margin: 0 auto; padding: 2rem 1rem 4rem; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 2rem; position: relative; }

    .logo {
      width: 64px; height: 64px; background: var(--brand);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem; box-shadow: 0 4px 20px rgba(83,74,183,0.25);
    }
    .logo svg { width: 32px; height: 32px; fill: #fff; }

    .header h1 { font-size: clamp(19px,5vw,24px); font-weight: 700; margin-bottom: 4px; }
    .welcome-msg { font-size: 14px; color: var(--text-2); margin-bottom: 2px; }

    .logout-btn {
      position: absolute; left: 0; top: 0;
      display: flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 600; color: var(--text-3);
      background: none; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 6px 12px; cursor: pointer; font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }
    .logout-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── Grid & Cards ── */
    .grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 520px) { .grid { grid-template-columns: repeat(2, 1fr); } }

    .card {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-card); padding: 14px 16px;
      text-decoration: none; color: inherit; cursor: pointer;
      transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s;
      -webkit-tap-highlight-color: transparent;
    }
    .card:hover { transform: translateY(-2px); border-color: var(--brand); box-shadow: 0 4px 16px rgba(83,74,183,0.12); }
    .card:active { transform: scale(0.98); }

    .icon-wrap {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .icon-wrap svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; }

    .c1 .icon-wrap { background: var(--c1-bg); color: var(--c1-fg); }
    .c2 .icon-wrap { background: var(--c2-bg); color: var(--c2-fg); }
    .c3 .icon-wrap { background: var(--c3-bg); color: var(--c3-fg); }
    .c4 .icon-wrap { background: var(--c4-bg); color: var(--c4-fg); }
    .c5 .icon-wrap { background: var(--c5-bg); color: var(--c5-fg); }
    .c6 .icon-wrap { background: var(--c6-bg); color: var(--c6-fg); }
    .ca .icon-wrap { background: var(--ca-bg); color: var(--ca-fg); }

    .card-text { flex: 1; min-width: 0; }
    .card-num  { font-size: 11px; font-weight: 500; color: var(--text-3); margin-bottom: 3px; }
    .card-name { font-size: 14.5px; font-weight: 600; color: var(--text-1); line-height: 1.45; }
    .arrow { flex-shrink: 0; width: 18px; height: 18px; stroke: var(--text-3); transform: scaleX(-1); }

    /* ── Export Panel ── */
    .export-panel {
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: var(--radius-card); margin-bottom: 2rem; overflow: hidden;
    }
    .export-toggle {
      width: 100%; display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: none; border: none; cursor: pointer;
      font-family: inherit; color: var(--text-1);
    }
    .export-toggle:hover { background: var(--brand-light); }
    .export-toggle-left { display: flex; align-items: center; gap: 10px; }
    .export-icon-wrap {
      width: 36px; height: 36px; background: var(--brand); border-radius: 10px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .export-icon-wrap svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; }
    .export-toggle-title { font-size: 15px; font-weight: 700; }
    .export-toggle-sub   { font-size: 12px; color: var(--text-3); margin-top: 1px; }
    .export-chev { width: 18px; height: 18px; stroke: var(--text-3); transition: transform 0.2s; flex-shrink: 0; }
    .export-chev.open { transform: rotate(180deg); }
    .export-body { padding: 0 18px 18px; border-top: 1px solid var(--border); display: none; }
    .export-body.open { display: block; }

    .exp-step { margin-top: 14px; }
    .exp-row  { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .exp-label { font-size: 13px; font-weight: 600; color: var(--text-2); white-space: nowrap; }
    .exp-input {
      flex: 1; min-width: 150px; padding: 9px 12px;
      border: 1.5px solid var(--border-s); border-radius: 8px;
      background: var(--surface-2); color: var(--text-1);
      font-family: inherit; font-size: 14px; direction: rtl; outline: none;
      transition: border-color 0.15s;
    }
    .exp-input:focus { border-color: var(--brand); }
    .exp-input[type="date"] { direction: ltr; }

    /* Mode toggle */
    .exp-mode { display: flex; gap: 8px; margin-bottom: 12px; }
    .exp-mode-btn {
      flex: 1; padding: 8px; border: 1.5px solid var(--border-s);
      border-radius: 8px; background: var(--surface-2);
      font-family: inherit; font-size: 13px; font-weight: 600;
      color: var(--text-2); cursor: pointer; transition: all 0.15s; text-align: center;
    }
    .exp-mode-btn.active { background: var(--brand-light); border-color: var(--brand); color: var(--brand); }

    .exp-section-label { font-size: 12px; font-weight: 700; color: var(--text-3); letter-spacing: 0.05em; margin: 14px 0 8px; }
    .exp-checkboxes { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    @media (max-width: 520px) { .exp-checkboxes { grid-template-columns: 1fr; } }
    .exp-check-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px; border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface-2);
      font-size: 13px; color: var(--text-1); user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .exp-check-item:hover { border-color: var(--brand); background: var(--brand-light); }
    .exp-check-item input[type="checkbox"] { accent-color: var(--brand); width: 15px; height: 15px; flex-shrink: 0; }

    .exp-actions { display: flex; align-items: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .exp-sel-btn {
      padding: 7px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; background: none; font-family: inherit;
      font-size: 13px; color: var(--text-2); cursor: pointer; transition: border-color 0.15s;
    }
    .exp-sel-btn:hover { border-color: var(--brand); color: var(--brand); }
    .exp-export-btn {
      margin-right: auto; padding: 10px 22px;
      background: var(--brand); color: #fff;
      border: none; border-radius: 8px; font-family: inherit;
      font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 8px; transition: background 0.15s;
    }
    .exp-export-btn:hover   { background: var(--brand-dark); }
    .exp-export-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .exp-export-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; }
    .exp-status { margin-top: 10px; font-size: 13px; color: var(--text-2); display: none; }

    /* ── Add User Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 18px;
      padding: 1.75rem; width: 100%; max-width: 380px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    }
    .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 1.25rem; }
    .modal-field { margin-bottom: 1rem; }
    .modal-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-2); margin-bottom: 5px; }
    .modal-input {
      width: 100%; padding: 11px 13px;
      border: 1.5px solid var(--border-s); border-radius: 9px;
      background: var(--bg); color: var(--text-1);
      font-family: inherit; font-size: 14px; direction: ltr; text-align: right;
      outline: none; transition: border-color 0.15s;
    }
    .modal-input:focus { border-color: var(--brand); }
    .modal-input::placeholder { color: var(--text-3); }
    select.modal-input { direction: rtl; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .modal-cancel {
      flex: 1; padding: 11px; border: 1.5px solid var(--border);
      border-radius: 9px; background: none; font-family: inherit;
      font-size: 14px; font-weight: 600; color: var(--text-2); cursor: pointer;
    }
    .modal-submit {
      flex: 2; padding: 11px; background: var(--brand); color: #fff;
      border: none; border-radius: 9px; font-family: inherit;
      font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s;
    }
    .modal-submit:hover { background: var(--brand-dark); }
    .modal-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .modal-msg { font-size: 13px; margin-top: 10px; display: none; text-align: center; }

    /* ══════════════════════════════════════════════════════════════
       PRINT AREA
       ══════════════════════════════════════════════════════════════ */
    #printArea {
      display: none;
      font-family: 'Thmanyah', 'Tajawal', Arial, sans-serif;
      direction: rtl; color: #1A1A1A; background: #fff;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    @media print {
      .page        { display: none !important; }
      .modal-overlay { display: none !important; }
      #printArea   { display: block !important; }
      @page { size: A4 portrait; margin: 1.2cm 1.5cm; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }

    /* Cover */
    .pf-cover { page-break-after: always; padding: 0.5rem 0; }
    .pf-cover-top {
      text-align: center; padding: 1.2rem 0 1rem;
      border-bottom: 2px solid #E5E5E5; margin-bottom: 1rem;
    }
    .pf-cover-main-title { font-size: 22px; font-weight: 700; }
    .pf-cover-sub { font-size: 13px; color: #888; margin-top: 5px; }
    .pf-cover-cards { display: flex; flex-direction: column; gap: 7px; }
    .pf-cover-card { display: flex; align-items: stretch; border: 1px solid #E8E8E8; border-radius: 10px; overflow: hidden; }
    .pf-cover-card-accent { width: 7px; flex-shrink: 0; }
    .pf-cover-card-body { padding: 10px 14px; flex: 1; display: flex; align-items: center; justify-content: space-between; }
    .pf-cover-card-name { font-size: 13px; font-weight: 700; }
    .pf-cover-card-stats { font-size: 11px; color: #777; display: flex; gap: 14px; }
    .pf-cover-card-stat { display: flex; align-items: center; gap: 4px; }
    .pf-cover-card-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pf-cover-no-data   { font-size: 11px; color: #bbb; font-style: italic; }

    /* Per-responder pages */
    .pf-responder { page-break-before: always; padding-top: 0.4rem; }
    .pf-resp-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 16px; border-radius: 10px; color: #fff; margin-bottom: 14px;
    }
    .pf-resp-bar-name { font-weight: 700; font-size: 14px; }
    .pf-resp-bar-meta  { opacity: 0.88; font-size: 11px; }

    /* Day header (standalone, above table) */
    .pf-day-header {
      font-size: 11px; font-weight: 700; color: #444;
      background: #EFEFED; padding: 5px 10px;
      border-radius: 6px; margin: 10px 0 4px;
    }

    /* Table */
    .pf-table { width: 100%; border-collapse: collapse; font-size: 10.5px; margin-bottom: 0.9rem; }
    .pf-table th { border: 1px solid rgba(0,0,0,0.15); padding: 7px 9px; text-align: right; font-weight: 700; color: #fff; font-size: 10px; }
    .pf-table td { border: 1px solid #E0E0E0; padding: 6px 9px; text-align: right; vertical-align: top; }
    .pf-table td.pf-nowrap { white-space: nowrap; }
    .pf-table tbody tr:nth-child(even) { background: #F8F8F7; }
    .pf-day-row td { font-weight: 700; font-size: 10px; background: #EFEFED !important; color: #333; padding: 5px 9px; border-top: 1.5px solid #C8C8C8; }

    /* Summary box */
    .pf-summary-box {
      margin-top: 10px; padding: 10px 14px;
      border-radius: 8px; background: #F5F4F2; font-size: 11px;
    }
    .pf-summary-title { font-weight: 700; font-size: 11.5px; margin-bottom: 6px; }
    .pf-summary-row { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #E8E8E8; }
    .pf-summary-count { font-weight: 700; }

    /* Type section in aggregate */
    .pf-type-header {
      font-size: 13px; font-weight: 700; margin: 14px 0 6px;
      padding-bottom: 4px; border-bottom: 2px solid currentColor;
    }

    /* General notes */
    .pf-general-notes { margin-top: 8px; padding: 10px 14px; border-radius: 8px; background: #F5F4F2; font-size: 11.5px; border-right: 3px solid #ccc; }
    .pf-general-notes strong { display: block; margin-bottom: 4px; font-size: 11px; }

    .pf-empty { margin-top: 1rem; padding: 24px; text-align: center; color: #999; font-size: 13px; border: 1px dashed #ccc; border-radius: 8px; }

  </style>
</head>
<body>
<div class="page">

  <!-- Export Panel (admin only) -->
  <div class="export-panel" id="exportPanel" style="display:none">
    <button class="export-toggle" onclick="toggleExport()" aria-expanded="false" id="exportToggle">
      <div class="export-toggle-left">
        <div class="export-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 3v12m0 0-4-4m4 4 4-4M3 17v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/></svg>
        </div>
        <div>
          <div class="export-toggle-title">تصدير البيانات — PDF</div>
          <div class="export-toggle-sub">استخراج التقارير بصيغة PDF</div>
        </div>
      </div>
      <svg class="export-chev" id="exportChev" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </button>

    <div class="export-body" id="exportBody">
      <div class="exp-step">
        <!-- Mode -->
        <div class="exp-section-label">نوع التصدير:</div>
        <div class="exp-mode">
          <button class="exp-mode-btn active" id="modeDay" onclick="setMode('day')">يوم واحد</button>
          <button class="exp-mode-btn" id="modeRange" onclick="setMode('range')">نطاق تاريخ</button>
        </div>

        <!-- Single day -->
        <div id="panelDay">
          <div class="exp-row">
            <label class="exp-label">التاريخ:</label>
            <input class="exp-input" type="date" id="expDate" />
          </div>
        </div>

        <!-- Date range -->
        <div id="panelRange" style="display:none">
          <div class="exp-row">
            <label class="exp-label">من:</label>
            <input class="exp-input" type="date" id="expDateFrom" />
          </div>
          <div class="exp-row">
            <label class="exp-label">إلى:</label>
            <input class="exp-input" type="date" id="expDateTo" />
          </div>
        </div>

        <div class="exp-section-label">الاستمارات المراد تصديرها:</div>
        <div class="exp-checkboxes" id="expCheckboxes"></div>

        <div class="exp-actions">
          <button class="exp-sel-btn" onclick="toggleAllForms(true)">تحديد الكل</button>
          <button class="exp-sel-btn" onclick="toggleAllForms(false)">إلغاء الكل</button>
          <button class="exp-export-btn" id="expExportBtn" onclick="doExport()">
            <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M12 18v-6m-3 3 3 3 3-3"/></svg>
            تصدير PDF
          </button>
        </div>
        <div class="exp-status" id="expStatus"></div>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="header">
    <button class="logout-btn" onclick="doLogout()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      خروج
    </button>
    <div class="logo" aria-hidden="true">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9 2 2 4-4"/>
      </svg>
    </div>
    <h1>بوابة الاستمارات</h1>
    <p class="welcome-msg" id="welcomeMsg"></p>
  </header>

  <!-- Cards grid -->
  <div class="grid" id="grid"></div>

</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="addUserModal">
  <div class="modal">
    <div class="modal-title">إضافة مستخدم جديد</div>
    <div class="modal-field">
      <label class="modal-label">رقم الهاتف</label>
      <input class="modal-input" type="tel" id="newPhone" placeholder="05XXXXXXXX" inputmode="tel" />
    </div>
    <div class="modal-field">
      <label class="modal-label">الاسم الكامل</label>
      <input class="modal-input" type="text" id="newName" placeholder="أدخل الاسم الكامل" />
    </div>
    <div class="modal-field">
      <label class="modal-label">الدور</label>
      <select class="modal-input" id="newRole">
        <option value="user">مستخدم</option>
        <option value="admin">مسؤول (Admin)</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeAddUser()">إلغاء</button>
      <button class="modal-submit" id="addUserBtn" onclick="submitAddUser()">إضافة</button>
    </div>
    <div class="modal-msg" id="addUserMsg"></div>
  </div>
</div>

<!-- Print Area -->
<div id="printArea" dir="rtl"></div>

<script>
  /* ── Auth ─────────────────────────────────────────────────── */
  const _user = JSON.parse(sessionStorage.getItem('user') || 'null');
  if (!_user) window.location.href = 'index.html';

  const IS_ADMIN = _user && _user.user_role === 'admin';

  document.getElementById('welcomeMsg').textContent = 'أهلاً وسهلاً، ' + (_user ? _user.full_name : '');

  function doLogout() {
    sessionStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  /* ── Config ───────────────────────────────────────────────── */
  const SHEET_URL   = "https://script.google.com/macros/s/AKfycbyx1sJwQM6-aQ8CgZ9TCPohsl7UXIpBR3ehDsMFpQHokE9msH6Mi7zw1BATQgNI1Lu2/exec";
  const EXPORT_KEY  = "12345.naser";

  const FORM_REGISTRY = [
    { num:1, sheet:"برنامج الأعمال اليوميّة",        color:"#534AB7", file:"form1.html",  colorClass:"c1" },
    { num:2, sheet:"مسؤول السّاحة",                   color:"#185FA5", file:"form5.html",  colorClass:"c2" },
    { num:3, sheet:"مسؤول المعهد",                    color:"#3B6D11", file:"form6.html",  colorClass:"c3" },
    { num:4, sheet:"مسؤول نشاطات المقارئ",            color:"#0F6E56", file:"form9.html",  colorClass:"c4" },
    { num:5, sheet:"برنامج تشغيل مبنى مدينة نصر",    color:"#993C1D", file:"form10.html", colorClass:"c5" },
  ];

  const FORM_ICONS = [
    `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9 2 2 4-4"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>`,
    `<svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`,
    `<svg viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4M8 6h.01M12 6h.01M16 6h.01M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h.01"/></svg>`,
    `<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  ];

  const RESPONDER_COL  = 2;
  const DATA_START_COL = 3;

  const WEEKDAYS = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

  /* ── Build cards ──────────────────────────────────────────── */
  (function buildGrid() {
    const grid = document.getElementById('grid');

    FORM_REGISTRY.forEach((f, idx) => {
      const a = document.createElement('a');
      a.href = f.file;
      a.className = `card ${f.colorClass}`;
      a.innerHTML = `
        <div class="icon-wrap">${FORM_ICONS[idx]}</div>
        <div class="card-text">
          <div class="card-num">استمارة ${toArabicNum(f.num)}</div>
          <div class="card-name">${f.sheet}</div>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      `;
      grid.appendChild(a);
    });

    if (IS_ADMIN) {
      const addCard = document.createElement('div');
      addCard.className = 'card ca';
      addCard.onclick = () => document.getElementById('addUserModal').classList.add('open');
      addCard.innerHTML = `
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
        </div>
        <div class="card-text">
          <div class="card-num">إدارة</div>
          <div class="card-name">إضافة مستخدم جديد</div>
        </div>
        <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      `;
      grid.appendChild(addCard);

      document.getElementById('exportPanel').style.display = 'block';
      buildFormCheckboxes();
    }
  })();

  /* ── Export panel ─────────────────────────────────────────── */
  function toggleExport() {
    const body = document.getElementById('exportBody');
    const chev = document.getElementById('exportChev');
    const open = body.classList.toggle('open');
    chev.classList.toggle('open', open);
    document.getElementById('exportToggle').setAttribute('aria-expanded', open);
  }

  let exportMode = 'day';
  function setMode(mode) {
    exportMode = mode;
    document.getElementById('panelDay').style.display   = mode === 'day'   ? '' : 'none';
    document.getElementById('panelRange').style.display = mode === 'range' ? '' : 'none';
    document.getElementById('modeDay').classList.toggle('active',   mode === 'day');
    document.getElementById('modeRange').classList.toggle('active', mode === 'range');
  }

  function buildFormCheckboxes() {
    const wrap = document.getElementById('expCheckboxes');
    if (wrap.children.length) return;
    FORM_REGISTRY.forEach(f => {
      const lbl = document.createElement('label');
      lbl.className = 'exp-check-item';
      lbl.innerHTML = `
        <input type="checkbox" value="${f.num}" checked />
        <span style="width:8px;height:8px;border-radius:50%;background:${f.color};flex-shrink:0"></span>
        ${f.sheet}
      `;
      wrap.appendChild(lbl);
    });
  }

  function toggleAllForms(state) {
    document.querySelectorAll('#expCheckboxes input[type=checkbox]').forEach(cb => cb.checked = state);
  }

  async function doExport() {
    let dateFrom, dateTo;
    if (exportMode === 'day') {
      const d = document.getElementById('expDate').value;
      if (!d) { showExpStatus('⚠️ يرجى اختيار التاريخ', '#D03B3B'); return; }
      dateFrom = dateTo = d;
    } else {
      dateFrom = document.getElementById('expDateFrom').value;
      dateTo   = document.getElementById('expDateTo').value;
      if (!dateFrom || !dateTo) { showExpStatus('⚠️ يرجى اختيار نطاق التاريخ', '#D03B3B'); return; }
      if (dateTo < dateFrom)    { showExpStatus('⚠️ تاريخ الانتهاء يجب أن يكون بعد تاريخ البداية', '#D03B3B'); return; }
    }

    const selected = [...document.querySelectorAll('#expCheckboxes input[type=checkbox]:checked')].map(cb => cb.value);
    if (!selected.length) { showExpStatus('⚠️ يرجى اختيار استمارة واحدة على الأقل', '#D03B3B'); return; }

    const btn = document.getElementById('expExportBtn');
    btn.disabled = true;
    showExpStatus('⏳ جاري تحميل البيانات...', 'var(--text-2)');

    try {
      const url  = `${SHEET_URL}?action=export&key=${EXPORT_KEY}&dateFrom=${dateFrom}&dateTo=${dateTo}&forms=${selected.join(',')}`;
      const res  = await fetch(url, { redirect: 'follow' });
      const json = await res.json();
      if (json.status !== 'ok') throw new Error(json.message || 'خطأ غير معروف');
      renderPrintArea(json.data, dateFrom, dateTo, selected.map(Number));
      showExpStatus('✅ جاهز. جاري فتح نافذة الطباعة...', '#0F6E56');
      setTimeout(() => window.print(), 400);
    } catch (err) {
      showExpStatus('❌ حدث خطأ: ' + err.message, '#D03B3B');
    } finally {
      btn.disabled = false;
    }
  }

  function showExpStatus(msg, color) {
    const el = document.getElementById('expStatus');
    el.textContent = msg; el.style.color = color; el.style.display = 'block';
  }

  /* ── Add User ─────────────────────────────────────────────── */
  function closeAddUser() {
    document.getElementById('addUserModal').classList.remove('open');
    document.getElementById('newPhone').value = '';
    document.getElementById('newName').value  = '';
    document.getElementById('newRole').value  = 'user';
    const msg = document.getElementById('addUserMsg');
    msg.style.display = 'none'; msg.textContent = '';
  }

  async function submitAddUser() {
    const phone    = document.getElementById('newPhone').value.trim();
    const fullName = document.getElementById('newName').value.trim();
    const role     = document.getElementById('newRole').value;
    const msg      = document.getElementById('addUserMsg');
    const btn      = document.getElementById('addUserBtn');

    if (!phone || !fullName) {
      msg.textContent = 'يرجى ملء جميع الحقول';
      msg.style.color = '#D03B3B'; msg.style.display = 'block';
      return;
    }

    btn.disabled = true; btn.textContent = 'جاري الإضافة...';
    try {
      await fetch(SHEET_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ formId: 'addUser', key: EXPORT_KEY, phone, fullName, role })
      });
      msg.textContent = '✅ تمت إضافة المستخدم بنجاح';
      msg.style.color = '#0F6E56'; msg.style.display = 'block';
      setTimeout(closeAddUser, 1800);
    } catch {
      msg.textContent = '❌ حدث خطأ. حاول مجدداً.';
      msg.style.color = '#D03B3B'; msg.style.display = 'block';
    } finally {
      btn.disabled = false; btn.textContent = 'إضافة';
    }
  }

  /* ── Print / Render ───────────────────────────────────────── */
  function formatDisplayDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    const wd = WEEKDAYS[new Date(iso).getDay()];
    return `${wd}، ${d}/${m}/${y}`;
  }
  function formatIsoDate(iso) {
    if (!iso) return iso;
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }
  function toArabicNum(n) {
    return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
  }

  function renderPrintArea(data, dateFrom, dateTo, selectedNums) {
    const area = document.getElementById('printArea');
    area.innerHTML = '';

    const dispFrom  = formatDisplayDate(dateFrom);
    const dispTo    = (dateTo && dateTo !== dateFrom) ? formatDisplayDate(dateTo) : null;
    const dateRange = dispTo ? `${dispFrom} — ${dispTo}` : dispFrom;

    /* ── Cover ── */
    const cover = document.createElement('div');
    cover.className = 'pf-cover';
    cover.innerHTML = `
      <div class="pf-cover-top">
        <div class="pf-cover-main-title">بوّابة الاستمارات — التّقرير الأسبوعيّ</div>
        <div class="pf-cover-sub">${dateRange} &nbsp;·&nbsp; الاستمارات المُصدَّرة: ${selectedNums.length}</div>
      </div>
      <div class="pf-cover-cards" id="pfCoverCards"></div>
    `;
    area.appendChild(cover);
    const cardsWrap = cover.querySelector('#pfCoverCards');

    const formRenderList = [];

    selectedNums.forEach(num => {
      const meta  = FORM_REGISTRY[num - 1];
      const sheet = data[meta.sheet];
      if (!sheet) return;

      const { headers, rows } = sheet;
      const grouped = {}, order = [];
      rows.forEach(row => {
        const name = String(row[RESPONDER_COL] || '').trim() || '(بدون اسم)';
        if (!grouped[name]) { grouped[name] = []; order.push(name); }
        grouped[name].push(row);
      });

      // Cover card
      const card = document.createElement('div');
      card.className = 'pf-cover-card';
      if (order.length) {
        card.innerHTML = `
          <div class="pf-cover-card-accent" style="background:${meta.color}"></div>
          <div class="pf-cover-card-body">
            <div class="pf-cover-card-name" style="color:${meta.color}">استمارة ${meta.sheet}</div>
            <div class="pf-cover-card-stats">
              <div class="pf-cover-card-stat"><div class="pf-cover-card-dot" style="background:${meta.color}"></div>${order.length} مستجيب</div>
              <div class="pf-cover-card-stat"><div class="pf-cover-card-dot" style="background:#C0C0C0"></div>${rows.length} سجل</div>
            </div>
          </div>`;
      } else {
        card.innerHTML = `
          <div class="pf-cover-card-accent" style="background:#E0E0E0"></div>
          <div class="pf-cover-card-body">
            <div class="pf-cover-card-name" style="color:#999">استمارة ${meta.sheet}</div>
            <div class="pf-cover-no-data">لا توجد بيانات</div>
          </div>`;
      }
      cardsWrap.appendChild(card);

      if (order.length) formRenderList.push({ meta, headers, rows, order, grouped });
    });

    /* ── Per-form pages ── */
    formRenderList.forEach(({ meta, headers, rows, order, grouped }) => {
      if (meta.sheet === 'برنامج الأعمال اليوميّة') {
        renderForm1Pages(area, meta, headers, rows, order, grouped, dateRange);
      } else {
        renderGenericPages(area, meta, headers, rows, order, grouped, dateRange);
      }
    });
  }

  /* ── Form 1 special rendering ─────────────────────────────── */
  function renderForm1Pages(area, meta, headers, rows, order, grouped, dateRange) {
    // cols: 0=ts,1=dt,2=responder,3=تاريخ اليوم,4=اليوم,5=#,6=نوع,7=وصف,8=بدء,9=انتهاء,10=حضور,11=غياب,12=ملاحظات
    const WORK_COLS     = [5, 6, 7, 8, 9, 10, 11, 12];
    const WORK_HEADERS  = WORK_COLS.map(i => headers[i] || '');

    order.forEach(name => {
      const personRows = grouped[name];
      const div = document.createElement('div');
      div.className = 'pf-responder';
      div.innerHTML = `
        <div class="pf-resp-bar" style="background:${meta.color}">
          <span class="pf-resp-bar-name">${name}</span>
          <span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span>
        </div>`;

      // Group by work date (col 3)
      const byDate = {}, dateOrder = [];
      personRows.forEach(row => {
        const d = String(row[3] || '').trim();
        if (!byDate[d]) { byDate[d] = []; dateOrder.push(d); }
        byDate[d].push(row);
      });

      dateOrder.forEach(date => {
        const dayRows = byDate[date];
        const weekday = dayRows[0][4] || '';
        const dh = document.createElement('div');
        dh.className = 'pf-day-header';
        dh.textContent = `${weekday}، ${formatIsoDate(date)}`;
        div.appendChild(dh);

        const table = document.createElement('table');
        table.className = 'pf-table';
        const thead = document.createElement('thead');
        thead.innerHTML = `<tr style="background:${meta.color}">${WORK_HEADERS.map(h=>`<th>${h}</th>`).join('')}</tr>`;
        table.appendChild(thead);
        const tbody = document.createElement('tbody');
        dayRows.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = WORK_COLS.map(i => {
            const isTime = (headers[i]||'').includes('وقت');
            return `<td${isTime?' class="pf-nowrap"':''}>${row[i]??''}</td>`;
          }).join('');
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        div.appendChild(table);
      });

      // Personal summary
      const typeCounts = {};
      personRows.forEach(row => {
        const type = String(row[6] || '').trim();
        if (type) typeCounts[type] = (typeCounts[type] || 0) + 1;
      });
      if (Object.keys(typeCounts).length) {
        const sb = document.createElement('div');
        sb.className = 'pf-summary-box';
        sb.innerHTML = `<div class="pf-summary-title" style="color:${meta.color}">ملخّص الأعمال</div>` +
          Object.entries(typeCounts).map(([t, c]) =>
            `<div class="pf-summary-row"><span>${t}</span><span class="pf-summary-count">${c}</span></div>`
          ).join('');
        div.appendChild(sb);
      }

      area.appendChild(div);
    });

    // Aggregate: per درس type across all people
    const typeAgg = {};
    rows.forEach(row => {
      const type = String(row[6] || '').trim();
      if (!type || type === 'مختلف') return;
      if (!typeAgg[type]) typeAgg[type] = [];
      typeAgg[type].push({
        date: String(row[3]||''), weekday: String(row[4]||''),
        person: String(row[2]||''), start: String(row[8]||''),
        end: String(row[9]||''), present: String(row[10]||''),
        absent: String(row[11]||''), notes: String(row[12]||'')
      });
    });

    if (Object.keys(typeAgg).length) {
      const aggDiv = document.createElement('div');
      aggDiv.className = 'pf-responder';
      aggDiv.innerHTML = `
        <div class="pf-resp-bar" style="background:${meta.color}">
          <span class="pf-resp-bar-name">ملخّص الدروس</span>
          <span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span>
        </div>`;

      Object.entries(typeAgg).forEach(([type, items]) => {
        const th = document.createElement('div');
        th.className = 'pf-type-header';
        th.style.color = meta.color;
        th.textContent = type;
        aggDiv.appendChild(th);

        const byDate = {}, dateOrder = [];
        items.forEach(item => {
          if (!byDate[item.date]) { byDate[item.date] = []; dateOrder.push(item.date); }
          byDate[item.date].push(item);
        });

        dateOrder.forEach(date => {
          const dayItems = byDate[date];
          const dh = document.createElement('div');
          dh.className = 'pf-day-header';
          dh.textContent = `${dayItems[0].weekday}، ${formatIsoDate(date)}`;
          aggDiv.appendChild(dh);

          const table = document.createElement('table');
          table.className = 'pf-table';
          const thead = document.createElement('thead');
          thead.innerHTML = `<tr style="background:${meta.color}"><th>المستجيب</th><th>وقت البدء</th><th>وقت الانتهاء</th><th>الحضور</th><th>الغياب</th><th>ملاحظات</th></tr>`;
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          dayItems.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${item.person}</td><td class="pf-nowrap">${item.start}</td><td class="pf-nowrap">${item.end}</td><td>${item.present}</td><td>${item.absent}</td><td>${item.notes}</td>`;
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          aggDiv.appendChild(table);
        });
      });

      area.appendChild(aggDiv);
    }
  }

  /* ── Generic form rendering (forms 5,6,9,10,11) ────────────── */
  function renderGenericPages(area, meta, headers, rows, order, grouped, dateRange) {
    const tableHeaders   = headers.slice(DATA_START_COL);
    const lastHeader     = tableHeaders[tableHeaders.length - 1] || '';
    const hasGeneralNotes = lastHeader === 'ملاحظات عامّة' || lastHeader === 'التوصيات';
    const generalNotesCol = hasGeneralNotes ? headers.length - 1 : -1;
    const tableCols      = headers.map((h,i)=>i).slice(DATA_START_COL);
    const displayCols    = hasGeneralNotes ? tableCols.slice(0,-1) : tableCols;
    const displayHeaders = displayCols.map(i => headers[i]);
    const dayColIdx      = headers.indexOf('اليوم');

    order.forEach(name => {
      const respRows = grouped[name];
      const div = document.createElement('div');
      div.className = 'pf-responder';

      const bar = document.createElement('div');
      bar.className = 'pf-resp-bar';
      bar.style.background = meta.color;
      bar.innerHTML = `<span class="pf-resp-bar-name">${name}</span><span class="pf-resp-bar-meta">استمارة ${meta.sheet} · ${dateRange}</span>`;
      div.appendChild(bar);

      const table = document.createElement('table');
      table.className = 'pf-table';
      const thead = document.createElement('thead');
      thead.innerHTML = `<tr style="background:${meta.color}">${displayHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`;
      table.appendChild(thead);
      const tbody = document.createElement('tbody');
      let lastDay = null;
      respRows.forEach(row => {
        const hasData = displayCols.some(i => String(row[i]||'').trim() !== '');
        if (!hasData) return;
        if (dayColIdx !== -1) {
          const dv = String(row[dayColIdx]||'').trim();
          if (dv && dv !== lastDay) {
            lastDay = dv;
            const dtr = document.createElement('tr');
            dtr.className = 'pf-day-row';
            dtr.innerHTML = `<td colspan="${displayCols.length}">${dv}</td>`;
            tbody.appendChild(dtr);
          }
        }
        const tr = document.createElement('tr');
        tr.innerHTML = displayCols.map(i => {
          const isTime = (headers[i]||'').includes('وقت');
          return `<td${isTime?' class="pf-nowrap"':''}>${row[i]??''}</td>`;
        }).join('');
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      div.appendChild(table);

      if (hasGeneralNotes) {
        const gnVal = String(respRows.find(r=>String(r[generalNotesCol]||'').trim())?.[generalNotesCol]||'').trim();
        if (gnVal) {
          const gn = document.createElement('div');
          gn.className = 'pf-general-notes';
          gn.style.borderColor = meta.color;
          gn.innerHTML = `<strong>${lastHeader}:</strong> ${gnVal}`;
          div.appendChild(gn);
        }
      }

      area.appendChild(div);
    });
  }

</script>
</body>
